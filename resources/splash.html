  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #0F172A;
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
    }

    .center {
      display: flex; flex-direction: column; align-items: center; gap: 20px;
    }

    .wordmark {
      width: 300px;
      height: auto;
      filter: drop-shadow(0 0 32px rgba(0, 174, 239, 0.25)) drop-shadow(0 8px 24px rgba(0,0,0,0.4));
    }

    .spinner {
      width: 28px; height: 28px;
      border: 2px solid rgba(255,255,255,0.06);
      border-top-color: #00AEEF;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin-top: 4px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      position: absolute;
      bottom: 16px;
      font-size: 10px;
      /* Was #1E293B — a Tailwind slate-800 on a slate-900 (#0F172A) background,
         near-zero contrast. This is the one place on the splash screen the
         Aszurex name appears as actual readable text (everything else is the
         Sarang logo/wordmark), so it must genuinely be readable, not just
         present — found via a real rendered screenshot at the splash window's
         actual 380x280 size (Phase 52 audit), the same class of "only a
         screenshot reveals this" bug this project hit once before with the
         document watermark z-index issue. */
      color: #64748B;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
  </style>
